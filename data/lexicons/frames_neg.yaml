# Negative-pole keywords for bipolar FrameAxis scoring.
# Same structure as frames.yaml — loader uses _flatten to get a flat term list per frame.
# Each list anchors the "clearly NOT this frame" end of the semantic axis.
#
# Rationale per frame:
#   innovation_opportunity neg → risk/danger language (articles emphasising harms, not benefits)
#   risk_safety neg            → positive/beneficial language (articles about AI's upside)
#   regulation_governance neg  → product/technical launch language (not about governance)
#   rights_privacy neg         → commercial/financial language (no rights framing)
#   economic_competition_labour neg → scientific/research language (not economic)
#   misinformation_integrity neg    → constructive/medical AI language (not deception)

innovation_opportunity:
  en: [risk, harm, danger, threat, warning, unsafe, misuse, failure]
  fr: [risque, préjudice, danger, menace, avertissement, dangereux, mauvais usage, échec]
  de: [risiko, schaden, gefahr, bedrohung, warnung, unsicher, missbrauch, versagen]
  es: [riesgo, daño, peligro, amenaza, advertencia, peligroso, uso indebido, fracaso]
  it: [rischio, danno, pericolo, minaccia, avvertimento, pericoloso, uso improprio, fallimento]
  nl: [risico, schade, gevaar, bedreiging, waarschuwing, onveilig, misbruik, mislukking]
  pl: [ryzyko, szkoda, zagrożenie, ostrzeżenie, niebezpieczny, nadużycie, niepowodzenie]
  pt: [risco, dano, perigo, ameaça, aviso, perigoso, uso indevido, falha]
  ro: [risc, daună, pericol, amenințare, avertisment, nesigur, utilizare necorespunzătoare, eșec]

