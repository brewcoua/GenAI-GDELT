genai_lexicon:
  # Proper nouns and product names — matched against AllNames (GDELT NER).
  # Language-invariant: these terms appear unchanged in non-English press.
  - chatgpt
  - generative ai
  - genai
  - gen ai
  - large language model
  - llm
  - foundation model
  - frontier model
  - gpt-4
  - gpt4
  - gpt-5
  - gpt5
  - claude
  - anthropic
  - gemini
  - bard
  - dall-e
  - dalle
  - stable diffusion
  - midjourney
  - text-to-image
  - image generator
  - copilot
  - grok
  - llama

genai_lexicon_contextual:
  # Descriptive phrases matched against Quotations (free text).
  # Keyed by ISO 639-1 language code. Shorter and more contextual than
  # genai_lexicon: brand names like "Bard" or "Grok" are omitted here
  # because they appear as ordinary words in quoted prose.
  en:
    - chatgpt
    - generative ai
    - large language model
    - foundation model
    - frontier model
    - anthropic
  fr:
