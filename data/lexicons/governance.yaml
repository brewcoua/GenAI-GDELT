gov_lexicon:
  # Governance / regulatory signal keywords matched against Quotations (free text).
  # Keyed by ISO 639-1 language code.
  #
  # Design decisions carried across all language sections:
  #   - "act" is excluded from "en": as a bare substring it matches "fact",
  #     "react", "impact", "contact", "interact", "exactly", "enact", "actor" etc.
  #     "ai act" and "eu ai act" are safe and kept because they are specific enough.
  #   - "deepfake" stays in "en" only — it is a universal loanword used verbatim
  #     across all EU languages without translation.
  #   - German "datenschutz" covers both "privacy" and "data protection"; listed once.
  #   - "compliance" and "governance" are international business/legal terms used
  #     verbatim in German, Dutch, and Italian press; they remain in those sections.
