# Frame keyword dictionaries.
# Structure: frame_name → iso-639-1 code → [terms].
# The loader in src/dictionaries.py flattens each frame's language lists into
# a single list, so downstream code sees dict[str, list[str]] as before.
#
# Terms are matched case-insensitively via substring (str.count with regex
# alternation). Avoid bare words short enough to produce false positives
# through incidental substrings.

